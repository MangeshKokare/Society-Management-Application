<!DOCTYPE html>
<html>
<head>
    <title>Service Provider Registration</title>
    <style>
        body { font-family: system-ui; background: #f5f5f5; }
        .form-box {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Register as Service Provider</h2>

    <form method="post">
        {% csrf_token %}

        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <input name="name" placeholder="Full Name" required>
        <input name="mobile" placeholder="Mobile Number" required>

        <select name="service" required>
            {% for s in services %}
                <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
        </select>

        <input name="area" placeholder="Area" required>
        <input name="city" placeholder="City" required>
        <input name="pincode" placeholder="Pincode" required>

        <input name="experience_years" placeholder="Experience (years)">
        <input name="monthly_rate" placeholder="Monthly Rate">

        <input name="preferred_timings" placeholder="Timings" required>
        <input name="available_days" placeholder="Available Days" required>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
