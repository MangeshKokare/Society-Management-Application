<!DOCTYPE html>
<html>
<head>
    <title>MyGate | Login</title>
    <style>
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .link {
            text-align: center;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🏢 MyGate Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}


{% if messages %}
    <div style="margin-bottom: 15px;">
        {% for message in messages %}
            <div style="
                padding: 12px 15px;
                border-radius: 8px;
                margin-bottom: 10px;
                font-size: 14px;
                font-weight: 600;
                color: white;
                background:
                    {% if message.tags == 'error' %}
                        #ef4444
                    {% elif message.tags == 'success' %}
                        #10b981
                    {% else %}
                        #3b82f6
                    {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="link">
        New user? <a href="{% url 'register' %}">Register</a>
    </div>
</div>

</body>
</html>
