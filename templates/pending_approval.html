<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pending Approval | MyGate</title>
    <style>
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 40px;
            width: 420px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,.25);
        }
        h1 {
            color: #667eea;
            margin-bottom: 15px;
        }
        p {
            color: #555;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .info {
            background: #f4f6fb;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⏳ Approval Pending</h1>
    <p>
        Your registration has been submitted successfully.
    </p>

    <div class="info">
        A <strong>Society Admin</strong> must approve your request before you
        can access the dashboard.
    </div>

    <p>
        You will be able to log in once approved.
    </p>

    <a href="{% url 'login' %}">Go to Login</a>
</div>

</body>
</html>
