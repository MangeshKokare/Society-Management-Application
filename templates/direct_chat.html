{% extends "base.html" %}
{% block title %}Chat with {{ other_name }}{% endblock %}

{% block extra_styles %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root {
  --accent:#00b386; --accent-dark:#008f6a; --accent-light:#e6f7f3;
  --sos:#ef4444;
  --text-primary:#1a1a2e; --text-secondary:#4b5563; --text-muted:#9ca3af;
  --surface:#ffffff; --surface-2:#f8fafc;
  --border:#e5e7eb; --border-light:#f3f4f6;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06); --shadow-md:0 4px 16px rgba(0,0,0,0.10);
  --radius-sm:10px; --radius-md:14px; --radius-lg:18px;
  --chat-height: calc(100vh - 130px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--surface-2);}

/* ── HEADER ── */
.chat-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;max-width:520px;margin:0 auto;
  box-shadow:var(--shadow-sm);
}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--surface-2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);transition:all 0.2s;flex-shrink:0;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid var(--surface);display:none;}
.online-dot.show{display:block;}
.chat-header-info{flex:1;min-width:0;}
.chat-header-name{font-size:16px;font-weight:900;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-header-status{font-size:11px;font-weight:700;color:var(--text-muted);margin-top:1px;}
.chat-header-status.online{color:#22c55e;}

/* ── MESSAGE AREA ── */
.chat-body{
  margin-top:70px;
  height:var(--chat-height);
  overflow-y:auto;
  padding:16px 16px 8px;
  display:flex;flex-direction:column;gap:6px;
  scroll-behavior:smooth;
  max-width:520px;margin-left:auto;margin-right:auto;
}
.chat-body::-webkit-scrollbar{width:3px;}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* DATE DIVIDER */
.date-divider{text-align:center;margin:10px 0 6px;position:relative;}
.date-divider span{font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface-2);padding:3px 12px;border-radius:20px;border:1px solid var(--border);}

/* MESSAGE BUBBLES */
.msg-row{display:flex;align-items:flex-end;gap:7px;max-width:88%;}
.msg-row.sent{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.received{align-self:flex-start;}
.msg-av{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:2px;}
.msg-av.hidden{visibility:hidden;}
.bubble{padding:10px 13px;border-radius:18px;font-size:14px;font-weight:600;line-height:1.5;word-break:break-word;position:relative;max-width:100%;}
.sent .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:5px;}
.received .bubble{background:var(--surface);color:var(--text-primary);border:1px solid var(--border-light);border-bottom-left-radius:5px;box-shadow:var(--shadow-sm);}
.msg-time{font-size:10px;font-weight:700;margin-top:3px;text-align:right;}
.sent .msg-time{color:rgba(255,255,255,0.75);}
.received .msg-time{color:var(--text-muted);}
.msg-wrap{display:flex;flex-direction:column;}
.sent .msg-wrap{align-items:flex-end;}
.received .msg-wrap{align-items:flex-start;}

/* TYPING INDICATOR */
.typing-indicator{display:none;align-items:center;gap:5px;padding:8px 0;}
.typing-indicator.show{display:flex;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:bounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* EMPTY STATE */
.chat-empty{text-align:center;padding:40px 20px;color:var(--text-muted);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.chat-empty-av{width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.chat-empty h3{font-size:16px;font-weight:900;color:var(--text-primary);margin-bottom:6px;}
.chat-empty p{font-size:13px;font-weight:600;line-height:1.5;}

/* ── INPUT BAR ── */
.chat-input-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  display:flex;align-items:flex-end;gap:8px;
  max-width:520px;margin:0 auto;
  box-shadow:0 -2px 12px rgba(0,0,0,0.06);
}
.chat-input-wrap{flex:1;background:var(--surface-2);border:1.5px solid var(--border);border-radius:22px;padding:10px 14px;display:flex;align-items:center;gap:8px;transition:border 0.2s;}
.chat-input-wrap:focus-within{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(0,179,134,0.1);}
#msgInput{flex:1;border:none;background:transparent;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text-primary);outline:none;resize:none;max-height:100px;line-height:1.4;}
#msgInput::placeholder{color:var(--text-muted);}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:all 0.2s;flex-shrink:0;box-shadow:0 3px 10px rgba(0,179,134,0.3);}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.05);}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* LOADING SPINNER */
.chat-loading{text-align:center;padding:40px 20px;color:var(--text-muted);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 0.9s linear infinite;display:inline-block;}

/* TOAST */
.chat-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.chat-toast.show{opacity:1;}

/* RESPONSIVE: on desktop, center the fixed bars */
@media (min-width:520px){
  .chat-header{left:50%;transform:translateX(-50%);width:520px;}
  .chat-input-bar{left:50%;transform:translateX(-50%);width:520px;}
}
</style>
{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="chat-header">
  <a href="javascript:history.back()" class="back-btn" aria-label="Back">
    <iconify-icon icon="mdi:arrow-left" width="20"></iconify-icon>
  </a>
  <div class="chat-avatar" id="avatarEl">
    {{ other_initial }}
    <div class="online-dot" id="onlineDot"></div>
  </div>
  <div class="chat-header-info">
    <div class="chat-header-name">{{ other_name }}</div>
    <div class="chat-header-status" id="statusText">Checking…</div>
  </div>
</div>

<!-- MESSAGE AREA -->
<div class="chat-body" id="chatBody">
  <div class="chat-loading" id="loadingEl">
    <iconify-icon icon="mdi:loading" width="36" class="spin" style="color:var(--accent);"></iconify-icon>
    <p style="margin-top:10px;font-size:13px;font-weight:700;">Loading conversation…</p>
  </div>
</div>

<!-- INPUT BAR -->
<div class="chat-input-bar">
  <div class="chat-input-wrap">
    <textarea id="msgInput" placeholder="Type a message…" rows="1"
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled aria-label="Send">
    <iconify-icon icon="mdi:send" width="20"></iconify-icon>
  </button>
</div>

<div class="chat-toast" id="chatToast"></div>

{% endblock %}

{% block scripts %}
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const OTHER_USER_ID = {{ other_user_id }};
const OTHER_NAME = "{{ other_name|escapejs }}";
const OTHER_INITIAL = "{{ other_initial }}";
const MY_INITIAL = "{{ request.user.username|slice:':1'|upper }}";

const API = {
  createChat:  '/api/chats/create/',
  messages:    id => `/api/chats/${id}/messages/`,
  send:        id => `/api/chats/${id}/send/`,
  markRead:    id => `/api/chats/${id}/mark-read/`,
  userStatus:  id => `/api/users/${id}/status/`,
  updateOnline:'/api/update-online-status/',
};

function csrf(){
  return (document.cookie.split(';').find(c=>c.trim().startsWith('csrftoken='))||'').split('=')[1]||'';
}

// ── STATE ──────────────────────────────────────────────────────────────────
let chatId       = {% if chat %}{{ chat.id }}{% else %}null{% endif %};
let pollTimer    = null;
let statusTimer  = null;
let lastMsgId    = 0;
let sending      = false;

// ── TOAST ──────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, ms=2400){
  const el = document.getElementById('chatToast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), ms);
}

// ── AUTO-RESIZE TEXTAREA ──────────────────────────────────────────────────
function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
}

function handleKey(e){
  // Send on Enter (not Shift+Enter)
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

// ── FORMAT TIME ───────────────────────────────────────────────────────────
function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function fmtDate(iso){
  const d   = new Date(iso);
  const now = new Date();
  const diff= Math.floor((now - d) / 86400000);
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Yesterday';
  return d.toLocaleDateString([], {day:'numeric', month:'short', year:'numeric'});
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────
function renderMessages(msgs, append=false){
  const body = document.getElementById('chatBody');

  if(!append){
    body.innerHTML = '';
    if(!msgs.length){
      body.innerHTML = `
        <div class="chat-empty">
          <div class="chat-empty-av">${OTHER_INITIAL}</div>
          <h3>Start a conversation</h3>
          <p>Say hello to <strong>{{ other_name }}</strong>!<br>Ask about their listing or introduce yourself.</p>
        </div>`;
      return;
    }
  }

  let lastDate = '';
  msgs.forEach((m, i) => {
    const isSent = m.is_sent_by_me || (m.sender && m.sender.id === {{ request.user.id }});
    const dateStr = fmtDate(m.created_at || m.timestamp);

    // Date divider
    if(dateStr !== lastDate){
      lastDate = dateStr;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${dateStr}</span>`;
      body.appendChild(div);
    }

    // Show avatar only on last message in a consecutive group
    const nextMsg  = msgs[i+1];
    const isLast   = !nextMsg || (nextMsg.is_sent_by_me || (nextMsg.sender && nextMsg.sender.id === {{ request.user.id }})) !== isSent;
    const showAv   = !isSent && isLast;

    const row = document.createElement('div');
    row.className = `msg-row ${isSent ? 'sent' : 'received'}`;
    row.dataset.msgId = m.id;

    row.innerHTML = `
      <div class="msg-av ${showAv ? '' : 'hidden'}">${OTHER_INITIAL}</div>
      <div class="msg-wrap">
        <div class="bubble">${escHtml(m.content || m.message || '')}</div>
        <div class="msg-time">${fmtTime(m.created_at || m.timestamp)}</div>
      </div>`;
    body.appendChild(row);
    lastMsgId = Math.max(lastMsgId, m.id || 0);
  });

  scrollToBottom();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollToBottom(){
  const body = document.getElementById('chatBody');
  body.scrollTop = body.scrollHeight;
}

// ── LOAD / CREATE CHAT ────────────────────────────────────────────────────
async function initChat(){
  if(!chatId){
    // Create or get the chat via the existing API
    try{
      const res = await fetch(API.createChat, {
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
        body: JSON.stringify({user_id: OTHER_USER_ID})
      });
      if(!res.ok) throw new Error(res.status);
      const data = await res.json();
      chatId = data.id || data.chat_id || data.chat?.id;
    } catch(e){
      document.getElementById('loadingEl').innerHTML = `
        <iconify-icon icon="mdi:alert-circle-outline" width="40" style="color:var(--sos);"></iconify-icon>
        <p style="margin-top:10px;font-size:13px;font-weight:700;color:var(--sos);">Could not start chat (${e.message})</p>`;
      return;
    }
  }
  await loadMessages();
  markRead();
  startPolling();
  checkOnlineStatus();
  startStatusPoll();
}

async function loadMessages(){
  if(!chatId) return;
  try{
    const res = await fetch(API.messages(chatId), {
      headers:{'X-Requested-With':'XMLHttpRequest'}
    });
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    // Support both {messages:[...]} and plain array
    const msgs = Array.isArray(data) ? data : (data.messages || data.results || []);
    renderMessages(msgs);
    document.getElementById('loadingEl')?.remove();
  } catch(e){
    toast('⚠️ Could not load messages');
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────
async function sendMessage(){
  if(sending) return;
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if(!text || !chatId) return;

  sending = true;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  // Optimistic render
  const tempId = 'tmp_' + Date.now();
  const body = document.getElementById('chatBody');
  // Remove empty state if present
  body.querySelector('.chat-empty')?.remove();

  const row = document.createElement('div');
  row.className = 'msg-row sent';
  row.id = tempId;
  row.innerHTML = `
    <div class="msg-av hidden"></div>
    <div class="msg-wrap">
      <div class="bubble">${escHtml(text)}</div>
      <div class="msg-time">Sending…</div>
    </div>`;
  body.appendChild(row);
  scrollToBottom();

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  try{
    const res = await fetch(API.send(chatId), {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
      body: JSON.stringify({message: text, content: text})
    });
    if(!res.ok) throw new Error(res.status);
    const msg = await res.json();

    // Replace optimistic bubble with real one
    const el = document.getElementById(tempId);
    if(el){
      el.querySelector('.msg-time').textContent = fmtTime(msg.created_at || msg.timestamp || new Date().toISOString());
      el.removeAttribute('id');
      lastMsgId = Math.max(lastMsgId, msg.id || 0);
    }
  } catch(e){
    const el = document.getElementById(tempId);
    if(el){
      el.querySelector('.bubble').style.opacity = '0.5';
      el.querySelector('.msg-time').textContent = '⚠️ Failed';
    }
    toast('⚠️ Message failed. Try again.');
  } finally{
    sending = false;
    input.focus();
  }
}

// ── MARK READ ─────────────────────────────────────────────────────────────
function markRead(){
  if(!chatId) return;
  fetch(API.markRead(chatId), {
    method:'POST',
    headers:{'X-CSRFToken':csrf()}
  }).catch(()=>{});
}

// ── POLLING FOR NEW MESSAGES ──────────────────────────────────────────────
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollNewMessages, 3000);
}

async function pollNewMessages(){
  if(!chatId) return;
  try{
    const url = lastMsgId
      ? `${API.messages(chatId)}?after=${lastMsgId}`
      : API.messages(chatId);
    const res  = await fetch(url, {headers:{'X-Requested-With':'XMLHttpRequest'}});
    if(!res.ok) return;
    const data = await res.json();
    const msgs = Array.isArray(data) ? data : (data.messages || data.results || []);
    const newMsgs = lastMsgId ? msgs.filter(m => (m.id||0) > lastMsgId) : msgs;
    if(newMsgs.length){
      // If after= param not supported, re-render all
      if(!lastMsgId){
        renderMessages(msgs);
      } else {
        renderMessages(newMsgs, true);
      }
      markRead();
    }
  } catch(e){/* silent */}
}

// ── ONLINE STATUS ─────────────────────────────────────────────────────────
async function checkOnlineStatus(){
  try{
    const res  = await fetch(API.userStatus(OTHER_USER_ID));
    if(!res.ok) return;
    const data = await res.json();
    const online = data.is_online || data.online;
    const dot    = document.getElementById('onlineDot');
    const status = document.getElementById('statusText');
    if(online){
      dot.classList.add('show');
      status.textContent = 'Online';
      status.classList.add('online');
    } else {
      dot.classList.remove('show');
      status.textContent = data.last_seen ? `Last seen ${formatLastSeen(data.last_seen)}` : 'Offline';
      status.classList.remove('online');
    }
  } catch(e){
    document.getElementById('statusText').textContent = '';
  }
}

function startStatusPoll(){
  if(statusTimer) clearInterval(statusTimer);
  statusTimer = setInterval(checkOnlineStatus, 30000);
  // Also update our own online status
  fetch(API.updateOnline, {method:'POST', headers:{'X-CSRFToken':csrf()}}).catch(()=>{});
}

function formatLastSeen(iso){
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if(diff < 1)   return 'just now';
  if(diff < 60)  return `${diff}m ago`;
  if(diff < 1440) return `${Math.floor(diff/60)}h ago`;
  return `${Math.floor(diff/1440)}d ago`;
}

// ── CLEANUP ───────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', ()=>{
  clearInterval(pollTimer);
  clearInterval(statusTimer);
  fetch('/api/set-offline-status/', {method:'POST', headers:{'X-CSRFToken':csrf()}, keepalive:true}).catch(()=>{});
});

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', initChat);
</script>
{% endblock %}
